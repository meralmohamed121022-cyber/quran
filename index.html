async function fetchSurahList() {
    if (mushafSurahList.length > 0) return;
    try {
        const res  = await fetch('https://api.alquran.cloud/v1/surah');
        const json = await res.json();
        if (json.code === 200) mushafSurahList = json.data;
    } catch(e) {}
}

// ============================================================
async function fetchQuranBookmarks() {
    // ✅ guard كامل
    if (typeof currentUser === 'undefined' || !currentUser) return false;
    if (typeof _supabase === 'undefined') return false;

    try {
        const { data, error } = await _supabase
            .from('quran_bookmarks')
            .select('*')
            .eq('owner_name', currentUser)
            .order('created_at', { ascending: false })
            .limit(100); // ✅ حماية من جلب آلاف الصفوف

        if (error) {
            console.warn('fetchQuranBookmarks error:', error.message);
            return false; // ✅ رجّع false عشان المستدعي يعرف فشلت
        }

        if (data) {
            quranBookmarks = data;
            return true; // ✅ رجّع true عشان المستدعي يعرف نجحت
        }

    } catch(e) {
        console.warn('fetchQuranBookmarks exception:', e); // ✅ بدل catch فاضي
        return false;
    }

    return false;
}

// ============================================================
async function openMushaf(mode, targetPage = null) {
    mushafMode = mode;
    const container = document.getElementById('mushaf-section');
    if(container) container.style.opacity = '0.5';

    // جلب البيانات
    const [bookmarks, surahs, settingsRes] = await Promise.all([
        fetchQuranBookmarks(), 
        fetchSurahList(),
        _supabase.from('user_mushaf_settings').select('*').eq('owner_name', currentUser).maybeSingle()
    ]);

    const settings = settingsRes.data;

    if (targetPage) {
        // ✅ لو جاي من فيفوريت، استخدم الصفحة المحددة
        currentMushafPage = parseInt(targetPage);
    } else if (settings) {
        // لو فتح عادي، استخدم آخر صفحة من سوبابيز
        currentMushafPage = (mode === 'reading') ? settings.last_page_reading : settings.last_page_tahajjud;
    } else {
        currentMushafPage = parseInt(localStorage.getItem(`mushaf_last_page_${mode}`) || 1);
    }

    if (settings && settings.last_reciter) currentReciter = settings.last_reciter;

    if(container) container.style.opacity = '1';
    renderMushaf();
}

    const meta = document.getElementById('mushaf-page-meta');
    if (!meta || !ayahs?.length) return;
    // ... إلخ
}
// ============================================================
// ✅ جلب نص الصفحة - مع retry تلقائي 3 مرات، وعرض مستمر
// ============================================================
// ============================================================
// ✅ جلب نص الصفحة - مع معالجة أحداث اللمس والضغط (Optimized for Android)
// ============================================================
async function loadPageText(pageNum, retryCount = 0) {
    const container = document.getElementById('mushaf-page-content');
    if (!container) return;

    // 1. إظهار اللودر عند أول محاولة تحميل
    if (retryCount === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding-top:35%;">
                <div style="font-size:35px;animation:spin 1s linear infinite;">⏳</div>
                <div style="color:#aaa;margin-top:10px;font-size:13px;">جاري تحميل الصفحة...</div>
            </div>`;
    }

    // ============================================================
    // ✅ الجزء الخاص بمصحف التهجد (Canva Embed) - تحسين الجودة برمجياً
    // ============================================================
    if (mushafMode === 'tahajjud') {
        const canvaBaseUrl = "https://www.canva.com/design/DAHGkdoy70Q/7aEXDyRBuOLdWH31nX5Pmw/view?embed";
        const pageUrl = `${canvaBaseUrl}#${pageNum}`;

        // ملاحظة: تم استخدام CSS لزيادة الحدة (Sharpness) وتحسين الرندر في الموبايل
        container.innerHTML = `
            <div style="position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 12px; background: #1a1a1a; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); -webkit-overflow-scrolling: touch; perspective: 1000px;">
                <iframe id="canva-tahajjud-frame"
                        loading="lazy" 
                        style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;
                               /* 🚀 فلاتر زيادة الحدة والتباين لمنع التغبيش */
                               filter: contrast(1.08) brightness(1.03) saturate(1.05);
                               -webkit-filter: contrast(1.08) brightness(1.03) saturate(1.05);
                               image-rendering: -webkit-optimize-contrast; 
                               image-rendering: crisp-edges;
                               /* تفعيل تسريع الهاردوير */
                               -webkit-transform: translateZ(0); 
                               transform: translateZ(0);
                               backface-visibility: hidden; 
                               -webkit-backface-visibility: hidden;"
                        src="${pageUrl}" 
                        allowfullscreen="allowfullscreen" 
                        allow="fullscreen">
                </iframe>
            </div>`;
        
        // تحديث العنوان والميتا لمصحف التهجد
        if (typeof updateTahajjudMeta === 'function') updateTahajjudMeta(pageNum);
        return;
    }

    // ============================================================
    // 📖 الجزء الخاص بمصحف القراءة (API)
    // ============================================================
    try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 10000);
        
        const requests = [
            fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`, { signal: ctrl.signal })
        ];
        
        if (typeof mushafShowTranslation !== 'undefined' && mushafShowTranslation) {
            requests.push(fetch(`https://api.alquran.cloud/v1/page/${pageNum}/en.sahih`, { signal: ctrl.signal }));
        }

        const responses = await Promise.all(requests);
        clearTimeout(timer);

        const arJson = await responses[0].json();
        const enJson = responses[1] ? await responses[1].json() : null;
        
        if (arJson.code !== 200) throw new Error('API error');

        const ayahs = arJson.data.ayahs;
        const enAyahs = enJson?.data?.ayahs || [];
        
        // تحديث معلومات الهيدر (اسم السورة والجزء)
        if (typeof updatePageMeta === 'function') updatePageMeta(ayahs);

        // وضع عرض الصور (المصحف المصور العادي)
        if (typeof mushafViewMode !== 'undefined' && mushafViewMode === 'image') {
            container.innerHTML = `
                <div style="text-align:center;width:100%;height:100%;overflow:auto;">
                    <img id="mushaf-image-view"
                        src="https://quran.ksu.edu.sa/png_big/${pageNum}.png"
                        style="max-width:none;width:${mushafZoom * 4}%;transition:width 0.3s;margin:auto;display:block;
                               image-rendering: -webkit-optimize-contrast; 
                               filter: contrast(1.05);">
                </div>`;
            return;
        }

        // بناء محتوى النص Uthmani
        const surahs = {};
        ayahs.forEach((a, i) => {
            const k = a.surah.number;
            if (!surahs[k]) surahs[k] = { name: a.surah.name, ayahs: [], enAyahs: [] };
            surahs[k].ayahs.push(a);
            if (enAyahs[i]) surahs[k].enAyahs.push(enAyahs[i]);
        });

        let html = '';
        for (const key in surahs) {
            const s = surahs[key];
            const firstAyah = s.ayahs[0];
            
            if (firstAyah.numberInSurah === 1) {
                html += `
                    <div style="text-align:center;margin:15px 0 10px;
                        background:linear-gradient(135deg,var(--dark-blue,#001f3f),#003366);
                        color:white;border-radius:12px;padding:12px;
                        font-family:'Amiri Quran',serif;font-size:20px;
                        box-shadow:0 3px 10px rgba(0,0,0,0.2);">۩ ${s.name} ۩</div>`;
                
                if (firstAyah.surah.number !== 1 && firstAyah.surah.number !== 9) {
                    html += `<div style="text-align:center;font-family:'Amiri Quran',serif;font-size:clamp(18px,5vw,24px);color:var(--dark-blue,#001f3f);margin:10px 0;line-height:2;">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>`;
                }
            }
            
            html += `<div style="text-align:justify;direction:rtl;padding:10px;line-height:2.5;">`;
            s.ayahs.forEach((a, i) => {
                const enText = s.enAyahs[i]?.text || '';
                const isAyahBookmarked = typeof quranBookmarks !== 'undefined' && quranBookmarks.some(
                    b => Number(b.surah_number) === a.surah.number && Number(b.ayah_number) === a.numberInSurah
                );
                
                const safeText = a.text.substring(0, 40).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeSName = a.surah.name.replace(/'/g, "\\'");
                const bg = isAyahBookmarked ? 'rgba(255,133,27,0.2)' : 'transparent';
                
                html += `
                    <span id="ayah-${a.surah.number}-${a.numberInSurah}" class="mushaf-text-span"
                        style="display:inline;line-height:2.2;font-family:'Amiri Quran',serif;
                        font-size:${mushafZoom}px;color:#1a1a2e;background:${bg};
                        border-radius:4px;padding:0 2px;transition:background 0.4s;">
                        ${a.text}
                        <span class="ayah-num-btn"
                            data-surah="${a.surah.number}"
                            data-surah-name="${safeSName}"
                            data-ayah="${a.numberInSurah}"
                            data-text="${safeText}"
                            style="display:inline-block;width:28px;height:28px;background:var(--orange,#ff851b);color:white;border-radius:50%;font-size:11px;text-align:center;line-height:28px;margin:0 4px;cursor:pointer;">
                            ${a.numberInSurah}
                        </span>
                        ${mushafShowTranslation && enText ? `<span style="display:block;font-size:14px;color:#666;direction:ltr;text-align:left;margin:10px 0;font-family:sans-serif;font-style:italic;">"${enText}"</span>` : ''}
                    </span> `;
            });
            html += `</div>`;
        }
        container.innerHTML = html;

        // إعادة تفعيل التظليل لو فيه سكرول معلق
        if (typeof pendingHighlight !== 'undefined' && pendingHighlight) {
            const { surah, ayah } = pendingHighlight;
            pendingHighlight = null;
            setTimeout(() => { if (typeof scrollAndHighlightAyah === 'function') scrollAndHighlightAyah(surah, ayah); }, 300);
        }

    } catch(err) {
        if (retryCount < 3) {
            await new Promise(r => setTimeout(r, 2000));
            return loadPageText(pageNum, retryCount + 1);
        }
        container.innerHTML = `
            <div style="text-align:center;padding:40px;">
                <div style="font-size:40px;margin-bottom:15px;">❌</div>
                <button onclick="loadPageText(${pageNum})" style="background:var(--orange);color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;">🔄 إعادة المحاولة</button>
            </div>`;
    }
}
// ✅ دالة مساعدة لتحديث اسم السورة في مصحف التهجد بناءً على الفهرس

// ✅ قائمة خيارات الآية (تظهر عند الضغط على رقم الآية)
// ============================================================
function showAyahMenu(surahNum, surahName, ayahNum, previewText, event) {
    event.stopPropagation();
    closeAyahMenu();

    const menu = document.createElement('div');
    menu.id = 'ayah-context-menu';

    const rect = event.target.getBoundingClientRect();
    const menuWidth = 220;
    let leftPos = rect.left + (rect.width / 2) - (menuWidth / 2);
    leftPos = Math.max(10, Math.min(leftPos, window.innerWidth - menuWidth - 10));
    let topPos = rect.bottom + 5;

    // لو المنيو هتطلع بره الشاشة من تحت، نطلعها فوق الرقم
    if (topPos + 100 > window.innerHeight) {
        topPos = rect.top - 110;
    }

    menu.style.cssText = `
        position: fixed; top: ${topPos}px; left: ${leftPos}px;
        width: ${menuWidth}px; background: white; border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 2px solid var(--orange, #ff851b); 
        z-index: 2147483647; overflow: hidden; animation: modalPop 0.2s ease-out; direction: rtl;`;

    const header = document.createElement('div');
    header.style.cssText = `padding:8px; background:var(--dark-blue, #001f3f); color:white; font-family:'Amiri Quran', serif; font-size:13px; text-align:center;`;
    header.textContent = `${surahName} • آية ${ayahNum}`;
    menu.appendChild(header);

    const actionsRow = document.createElement('div');
    actionsRow.style.cssText = `display:flex; justify-content:space-evenly; align-items:center; padding:15px 10px;`;

    const actions = [
        { icon: '🔖', label: 'حفظ', fn: () => toggleAyahBookmark(surahNum, surahName, ayahNum, previewText) },
        { 
            icon: '📋', 
            label: 'نسخ', 
            fn: () => {
                const ayahEl = document.getElementById(`ayah-${surahNum}-${ayahNum}`);
                const textToCopy = ayahEl ? ayahEl.innerText.replace(/[0-9]/g, '').trim() : previewText;
                // تأكد إن اسم الدالة copyToClipboard مطابق للي عندك
                if (typeof copyToClipboard === 'function') {
                    copyToClipboard(textToCopy);
                } else if (typeof copyAyahText === 'function') {
                    copyAyahText(surahNum, ayahNum, textToCopy);
                }
            } 
        },
        { icon: '🔊', label: 'صوت', fn: () => playAyah(surahNum, ayahNum) },
        { icon: '🌐', label: 'تفسير', fn: () => showTafsir(surahNum, ayahNum) },
    ];

    actions.forEach(a => {
        const btn = document.createElement('div');
        btn.setAttribute('role', 'button');
        btn.setAttribute('tabindex', '0');
        btn.style.cssText = `display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; -webkit-tap-highlight-color:transparent; outline:none;`;
        
        btn.innerHTML = `
            <div style="width:45px; height:45px; background:#f8f9fa; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; border:1px solid #eee; pointer-events:none;">${a.icon}</div>
            <span style="font-size:10px; color:#666; font-weight:bold; pointer-events:none;">${a.label}</span>`;
        
        // استخدام click للويب و pointerdown للموبايل لضمان السرعة
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            a.fn(); 
            setTimeout(closeAyahMenu, 200); 
        });

        // ✅ السطر ده هو اللي كان ناقص عشان الايقونات تظهر
        actionsRow.appendChild(btn);
    });

    menu.appendChild(actionsRow);
    document.body.appendChild(menu);

    const outsideClick = (e) => {
        if (!menu.contains(e.target)) {
            closeAyahMenu();
            document.removeEventListener('click', outsideClick);
        }
    };
    
    setTimeout(() => {
        document.addEventListener('click', outsideClick);
    }, 10);
}
function closeAyahMenu() {
    document.getElementById('ayah-context-menu')?.remove();
}
// ============================================================
function scrollAndHighlightAyah(surahNum, ayahNum) {
    const el = document.getElementById(`ayah-${surahNum}-${ayahNum}`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    el.style.background  = 'rgba(255,133,27,0.4)';
    el.style.transition = 'background 0.5s';

    setTimeout(() => {
        const isBookmarked = quranBookmarks.some(b => Number(b.surah_number) === surahNum && Number(b.ayah_number) === ayahNum);
        el.style.background  = isBookmarked ? 'rgba(255,133,27,0.2)' : 'transparent';
    }, 3000);
}

function goToSearchResult(page, surahNum, ayahNum) {
    if (!page) return;

    // ✅ تأمين رقم الصفحة: المصحف من 1 لـ 604 فقط
    let p = parseInt(page);
    if (p > 604) p = 604;
    if (p < 1) p = 1;

    currentMushafPage = p;

    // إخفاء نتائج البحث (الصغيرة والعامة)
    const resultsDiv = document.getElementById('mushaf-search-results');
    if (resultsDiv) resultsDiv.style.display = 'none';

    mushafViewMode = 'text';

    // تجهيز بيانات التظليل والسكرول
    // لو مفيش رقم آية (زي الانتقال لسورة) بنخليها أول آية
    pendingHighlight = {
        surah: parseInt(surahNum) || 0,
        ayah: parseInt(ayahNum) || 1
    };

    // لو المصحف مقفول أصلاً نفتحه، لو مفتوح نعمل رندر فوراً
    if (!document.getElementById('mushaf-overlay')) {
        openMushaf(mushafMode || 'reading');
    } else {
        renderMushaf();
    }
}

async function showMushafNav() {
    // 1. التأكد من جلب البيانات أولاً (لو المصفوفة فاضية استناها)
    if (!mushafSurahList || mushafSurahList.length === 0) {
        if (typeof Android !== 'undefined') Android.showToast("جاري تحميل الفهرس... ⏳");
        await fetchSurahList();
    }

    // 2. مسح أي لوحة قديمة موجودة
    document.getElementById('mushaf-nav-panel')?.remove();

    // فحص المود الحالي
    const isTahajjud = (typeof mushafMode !== 'undefined' && mushafMode === 'tahajjud');

    const panel = document.createElement('div');
    panel.id = 'mushaf-nav-panel';
    
    // ✅ رفعنا الـ z-index لأعلى قيمة ممكنة لضمان الظهور فوق المصحف
    panel.style.cssText = `
        position:fixed;bottom:0;left:0;right:0;
        z-index:2147483647; 
        background:white;border-radius:25px 25px 0 0;
        box-shadow:0 -10px 40px rgba(0,0,0,0.5);
        max-height:85vh;display:flex;flex-direction:column;
        animation:slideUp 0.3s ease-out;
        direction: rtl;`;

    if (!document.getElementById('mushaf-nav-style')) {
        const style = document.createElement('style');
        style.id = 'mushaf-nav-style';
        style.innerHTML = `@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`;
        document.head.appendChild(style);
    }

    panel.innerHTML = `
        <div style="padding:16px 20px;background:var(--dark-blue,#001f3f);
            border-radius:25px 25px 0 0;flex-shrink:0;
            display:flex;align-items:center;justify-content:space-between;">
            <span style="color:var(--orange,#ff851b);font-weight:bold;font-size:18px;
                font-family:'Amiri Quran',serif;">🗂️ ${isTahajjud ? 'فهرس مصحف التهجد' : 'قائمة الانتقال السريع'}</span>
            <div id="nav-close-btn"
                style="color:white;font-size:24px;cursor:pointer;width:35px;height:35px;
                display:flex;align-items:center;justify-content:center;
                background:rgba(255,255,255,0.1);border-radius:50%;">✕</div>
        </div>

        <div style="padding:12px;flex-shrink:0;background:#fdfcf0;border-bottom:1px solid #eee;">
            <input type="text" id="nav-unified-search"
                placeholder="${isTahajjud ? '🔍 ابحث عن سورة في التهجد...' : '🔍 ابحث عن سورة، جزء، أو رقم صفحة...'}"
                style="width:100%;padding:12px 16px;border-radius:15px;
                border:2px solid var(--orange,#ff851b);font-size:15px;
                direction:rtl;outline:none;box-sizing:border-box;
                font-family:'Amiri Quran',serif;box-shadow:0 4px 10px rgba(0,0,0,0.05);">
        </div>

        <div id="nav-tabs-bar" style="display:${isTahajjud ? 'none' : 'flex'}; flex-shrink:0; background:#fdfcf0;
            padding:0 10px; border-bottom:1px solid #eee;">
            <button id="nav-tab-surah"
                style="flex:1;padding:12px;border:none;background:var(--orange,#ff851b);
                color:white;font-weight:bold;border-radius:10px 10px 0 0;
                margin:0 2px;font-size:14px;cursor:pointer;">📖 السور</button>
            <button id="nav-tab-juz"
                style="flex:1;padding:12px;border:none;background:#eee;color:#555;
                font-weight:bold;border-radius:10px 10px 0 0;
                margin:0 2px;font-size:14px;cursor:pointer;">📑 الأجزاء</button>
            <button id="nav-tab-ayah"
                style="flex:1;padding:12px;border:none;background:#eee;color:#555;
                font-weight:bold;border-radius:10px 10px 0 0;
                margin:0 2px;font-size:14px;cursor:pointer;">🔢 آية</button>
        </div>

        <div id="nav-tab-content"
            style="flex:1;overflow-y:auto;padding:10px;background:white;">
            ${isTahajjud ? buildTahajjudDefaultList() : buildSurahListNav('')}
        </div>`;

    document.body.appendChild(panel);

    // ✅ ربط الأحداث
    document.getElementById('nav-close-btn')?.addEventListener('click', () => panel.remove());

    document.getElementById('nav-unified-search')?.addEventListener('input', function() { 
        navUnifiedSearch(this.value); 
    });

    // ربط التابات فقط إذا كانت ظاهرة
    if (!isTahajjud) {
        document.getElementById('nav-tab-surah')?.addEventListener('click', () => switchNavTab('surah'));
        document.getElementById('nav-tab-juz')?.addEventListener('click', () => switchNavTab('juz'));
        document.getElementById('nav-tab-ayah')?.addEventListener('click', () => switchNavTab('ayah'));
    }

    // ✅ Event delegation للنتائج
    document.getElementById('nav-tab-content')?.addEventListener('click', (e) => {
        const item = e.target.closest('[data-navto]');
        if (!item) return;
        
        // استخدام دالة navTo الموحدة لضمان الفلترة الصحيحة للأرقام
        if (typeof navTo === 'function') {
            navTo(item.dataset.navto);
        } else {
            const p = parseInt(item.dataset.navto);
            currentMushafPage = p;
            panel.remove();
            if (document.getElementById('mushaf-overlay')) {
                renderMushaf();
            } else {
                openMushaf(mushafMode || 'reading');
            }
        }
    });

    setTimeout(() => document.getElementById('nav-unified-search')?.focus(), 350);
}

    // ✅ حالة البحث الفارغ: عرض القائمة الافتراضية لكل مود
    if (!q) {
        if (tabsBar) tabsBar.style.display = 'flex';
        if (isTahajjud) {
            content.innerHTML = buildTahajjudDefaultList();
        } else {
            content.innerHTML = buildSurahListNav('');
        }

    }

    if (tabsBar) tabsBar.style.display = 'none';

    const qNorm = normalizeArabic(q);
    const qNum = parseInt(q);
    let html = '';

    // 1️⃣ منطق "الصفحة المباشرة" (فرملة الأرقام حسب المود)

        if (btn) {
            btn.style.background = t === tab ? 'var(--orange,#ff851b)' : '#f5f5f5';
            btn.style.color      = t === tab ? 'white' : '#333';
        }
    });

    const c = document.getElementById('nav-tab-content');
    if (!c) return;

    if (tab === 'surah') {
        c.innerHTML = buildSurahListNav('');
        // ✅ ربط البحث بعد innerHTML
        document.getElementById('surah-nav-search')?.addEventListener('input', function() {
            const val      = this.value;

                    s.name.includes(val) ||
                    s.englishName.toLowerCase().includes(val.toLowerCase()) ||
                    String(s.number).includes(val))
                : mushafSurahList;
            const items = document.getElementById('surah-nav-items');
            if (items) items.innerHTML = filtered.length === 0
                ? '<div style="text-align:center;padding:20px;color:#aaa;">لا نتائج</div>'
                : filtered.map(s => buildSurahNavItem(s, val)).join('');
        });
    }

    if (tab === 'juz') {
        c.innerHTML = buildJuzListNav('');
        // ✅ ربط البحث بعد innerHTML
        document.getElementById('juz-nav-search')?.addEventListener('input', function() {
            const val = this.value;
            const all = JUZ_NAMES.map((name, i) => ({ name, num: i+1, page: JUZ_PAGES[i] }));
            const filtered = val
                ? all.filter(j => j.name.includes(val) || String(j.num).includes(val))
                : all;
            const items = document.getElementById('juz-nav-items');
            if (items) items.innerHTML = filtered.length === 0
                ? '<div style="text-align:center;padding:20px;color:#aaa;">لا نتائج</div>'
                : filtered.map(j => buildJuzNavItem(j, val)).join('');
        });
    }

    if (tab === 'ayah') {
        c.innerHTML = buildAyahPicker();
        // ✅ ربط كل أحداث الـ ayah picker
        document.getElementById('surah-picker-search')?.addEventListener('input', function() {
            filterAyahSurahList(this.value);
        });
        document.getElementById('goto-ayah-btn')?.addEventListener('click', goToAyah);

        // ✅ Event delegation لاختيار السورة
        document.getElementById('ayah-surah-picker-list')?.addEventListener('click', (e) => {
            const item = e.target.closest('[data-surah-num]');
            if (!item) return;
            selectAyahSurah(
                parseInt(item.dataset.surahNum),
                item.dataset.surahName,
                parseInt(item.dataset.ayahCount)
            );
        });
    }
}

    try {
        const res  = await fetch(`https://api.alquran.cloud/v1/ayah/${ayahPickerSelectedSurah}:${ayahNum}`);

        if (json.code === 200) {
            document.getElementById('mushaf-nav-panel')?.remove();

function normalizeArabic(text) {
    if (!text) return "";
    return text
        .replace(/[أإآا]/g, 'ا')
        .replace(/ة/g, 'ه')
        .replace(/ى/g, 'ي')
        .replace(/[\u064B-\u065F]/g, '') // حذف التشكيل (فتحة، ضمة، إلخ)
        .trim();
}
let mushafSearchTimer = null;
async function mushafFuzzySearch(value) {
    clearTimeout(mushafSearchTimer);
    const resultsDiv = document.getElementById('mushaf-search-results');
    if (!resultsDiv) return;

    const query = value.trim();
    if (!query || query.length < 2) {
        resultsDiv.style.display = 'none';
        return;
    }

    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = '<div style="padding:15px;text-align:center;color:var(--orange);font-size:14px;">⏳ جاري البحث...</div>';

    mushafSearchTimer = setTimeout(async () => {
        try {
            const normalizedQuery = normalizeArabic(query);
            const res  = await fetch(`https://api.alquran.cloud/v1/search/${encodeURIComponent(normalizedQuery)}/all/quran-simple-clean`);
            const json = await res.json();
            const matches = json?.data?.matches || [];

            if (matches.length === 0) {
                resultsDiv.innerHTML = `<div style="padding:20px;text-align:center;color:#999;direction:rtl;">
                    لم نجد آية تحتوي على "${query}" 🔍</div>`;

            // ✅ data-* بدل onclick على كل نتيجة
            html += matches.slice(0, 25).map(m => {

function highlightMatch(text, query) {
    try {
        const norm = normalizeArabic(query);
        return text.replace(new RegExp(norm, 'gi'),
            m => `<mark style="background:rgba(255,133,27,0.4);border-radius:3px;
                padding:1px 3px;font-weight:bold;">${m}</mark>`
        );
    } catch { return text; }
}

function showReciterPicker() {
    document.getElementById('reciter-panel')?.remove();
    document.getElementById('reciter-backdrop')?.remove();

    const backdrop = document.createElement('div');
    backdrop.id = 'reciter-backdrop';
    backdrop.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;z-index:2147483646;background:rgba(0,0,0,0.2);`;

    const panel = document.createElement('div');
    panel.id = 'reciter-panel';
    panel.style.cssText = `position:fixed;bottom:0;left:0;right:0;z-index:2147483647;background:white;border-radius:20px 20px 0 0;max-height:65vh;display:flex;flex-direction:column;direction:rtl;`;

    // 1. تجهيز القائمة المدمجة
    let allReciters = { ...RECITERS_AYAH, ...RECITERS_SURAH };
    let entries = Object.entries(allReciters);

    // 2. منطق الترتيب الذكي (Sorting)
    entries.sort((a, b) => {
        const keyA = a[0];
        const keyB = b[0];
        const isASurah = RECITERS_SURAH.hasOwnProperty(keyA);
        const isBSurah = RECITERS_SURAH.hasOwnProperty(keyB);

        if (window.isContinuousPlay) {
            // لو وضع السور (🔁) شغال: حط بتوع السور فوق
            if (isASurah && !isBSurah) return -1;
            if (!isASurah && isBSurah) return 1;
        } else {
            // لو وضع الآيات (▶️) شغال: حط بتوع الآيات فوق
            if (!isASurah && isBSurah) return -1;
            if (isASurah && !isBSurah) return 1;
        }
        return 0; // لو الاتنين نفس النوع سيب الترتيب زي ما هو
    });

    let statusNotice = window.isContinuousPlay ? "الأولوية لقراء السور الكاملة" : "الأولوية لقراء التحديد الدقيق";

    panel.innerHTML = `
        <div style="padding:15px 20px;background:#001f3f;border-radius:20px 20px 0 0;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
            <div>
                <span style="color:#ff851b;font-weight:bold;font-size:16px;">🎙️ اختر الشيخ</span>

            </div>

        </div>
        <div style="padding:10px 12px;flex-shrink:0;border-bottom:1px solid #eee;background:#fdfcf0;">
            <input id="reciter-search-input" type="text" placeholder="🔍 ابحث عن شيخ..." style="width:100%;padding:10px 12px;border-radius:10px;border:2px solid #ff851b;font-size:14px;direction:rtl;outline:none;box-sizing:border-box;">
        </div>
        <div id="reciter-list" style="flex:1;overflow-y:auto;padding:8px;background:white;-webkit-overflow-scrolling:touch;">
            ${buildReciterList(entries)}
        </div>`;

    document.body.appendChild(backdrop);
    document.body.appendChild(panel);

    const close = () => { panel.remove(); backdrop.remove(); };
    backdrop.addEventListener('click', close);
    document.getElementById('reciter-close-btn').addEventListener('click', close);
    document.getElementById('reciter-search-input').addEventListener('input', function() {
        filterReciters(this.value, allReciters);
    });
    document.getElementById('reciter-list').addEventListener('click', (e) => {
        const item = e.target.closest('[data-reciter-key]');
        if (item) { selectReciter(item.dataset.reciterKey); close(); }
    });

function buildReciterList(entries) {
    // ✅ data-reciter-key بدل onclick
    return entries.map(([k, v]) => `
        <div data-reciter-key="${k}"
            style="padding:12px 15px;border-bottom:1px solid #f5f5f5;cursor:pointer;
            display:flex;align-items:center;justify-content:space-between;
            background:${k === currentReciter ? '#fff9f0' : 'white'};
            border-right:${k === currentReciter ? '4px solid var(--orange,#ff851b)' : '4px solid transparent'};
            border-radius:8px;margin-bottom:2px;">
            <span style="font-size:15px;color:var(--dark-blue,#001f3f);
                font-weight:${k === currentReciter ? 'bold' : 'normal'};">${v}</span>
            ${k === currentReciter ? '<span style="color:var(--orange,#ff851b);font-size:18px;">✓</span>' : ''}
        </div>`).join('');
}

function filterReciters(query) {
    const list = document.getElementById('reciter-list');
    if (!list) return;
    const filtered = Object.entries(RECITERS).filter(([k, v]) =>
        v.includes(query) || k.toLowerCase().includes(query.toLowerCase()));
    list.innerHTML = buildReciterList(filtered);
    // Delegation موجود على list من showReciterPicker ✅
}
function selectReciter(key) {

// ✅ تشغيل الصوت
// ============================================================
async function playAyah(surah, ayahNum) {
    const btn = document.getElementById(`play-btn-${surah}-${ayahNum}`);
    const ayahKey = `${surah}-${ayahNum}`;
    
    // إيقاف الصوت لو ضغطت على حاجة شغالة
    if (currentAudio && !currentAudio.paused && (window.currentPlayingAyah === ayahKey || window.currentPlayingSurah === surah)) {
        stopAudio();
        document.querySelectorAll('[id^="play-btn-"]').forEach(b => b.innerHTML = '▶️');
        return;
    }
    
    stopAudio();
    const sStr = String(surah).padStart(3, '0');
    const aStr = String(ayahNum).padStart(3, '0');
    if (btn) btn.innerHTML = '⏳';

    // 💡 فحص نوع القارئ: هل هو رابط (سورة) ولا معرف (آية)؟
    const isLink = currentReciter.startsWith("http");

    if (isLink) {
        // 1. نظام السور الكاملة (مصطفى خميس، سيد سعيد، إلخ)
        window.currentPlayingSurah = surah;
        window.currentPlayingAyah = null;
        
        // جرب السيرفرات المتاحة للسور
        const servers = ["server8", "server11", "server12", "server16", "server6"];
        tryServers(0, servers, sStr, surah, btn);
    } else {
        // 2. نظام الآيات الدقيق (المنشاوي، الحصري، إلخ)
        window.currentPlayingAyah = ayahKey;
        window.currentPlayingSurah = null;
        
        const ayahUrl = `https://everyayah.com/data/${currentReciter}/${sStr}${aStr}.mp3`;
        const mirrorUrl = `https://mirrors.quranicaudio.com/everyayah/${currentReciter}/${sStr}${aStr}.mp3`;
        
        playSingle(ayahUrl, mirrorUrl, surah, ayahNum, btn);
    }
}

// دالة تشغيل السور الكاملة مع تبديل السيرفرات
function tryServers(idx, servers, sStr, surah, btn) {
    if (idx >= servers.length) {
        if (btn) btn.innerHTML = '⚠️';
        return;
    }
    // تغيير السيرفر في الرابط
    let url = currentReciter.replace(/server\d+/, servers[idx]) + `${sStr}.mp3`;
    if (currentReciter.includes("archive.org")) url = currentReciter + `${sStr}.mp3`;

    const audio = new Audio(url);
    const timeout = setTimeout(() => { audio.pause(); tryServers(idx + 1, servers, sStr, surah, btn); }, 5000);

    audio.play().then(() => {
        clearTimeout(timeout);
        currentAudio = audio;
        document.querySelectorAll(`[id^="play-btn-${surah}-"]`).forEach(b => b.innerHTML = '⏸️');
        setupEndEvents(audio, surah, 1, true);
    }).catch(() => {
        clearTimeout(timeout);
        tryServers(idx + 1, servers, sStr, surah, btn);
    });
}

// دالة تشغيل الآيات المنفصلة
function playSingle(url, mirror, surah, ayah, btn) {
    currentAudio = new Audio(url);
    currentAudio.play().then(() => {
        if (btn) btn.innerHTML = '⏸️';
        setupEndEvents(currentAudio, surah, ayah, false);
    }).catch(() => {
        // جرب السيرفر البديل للآيات
        currentAudio = new Audio(mirror);
        currentAudio.play().then(() => {
            if (btn) btn.innerHTML = '⏸️';
            setupEndEvents(currentAudio, surah, ayah, false);
        }).catch(() => { if (btn) btn.innerHTML = '❌'; });
    });
}

// دالة التحكم في نهاية الصوت (التشغيل المتواصل)
function setupEndEvents(audio, sNum, aNum, isFull) {
    audio.onended = () => {
        document.querySelectorAll('[id^="play-btn-"]').forEach(b => b.innerHTML = '▶️');
        if (window.isContinuousPlay) {
            if (isFull) playAyah(sNum + 1, 1); // سورة تجيب سورة
            else playNextAyahAuto(sNum, aNum); // آية تجيب آية بدقة
        }
    };
}

// --- وظيفة تشغيل السورة الكاملة (للقراء الجدد) ---
function tryPlayingSurah(idx, servers, sStr, surah, btn) {
    if (idx >= servers.length) {
        finalError(btn, "❌ الملف غير متاح");
        return;
    }

    let currentUrl = currentReciter.replace(/server\d+/, servers[idx]) + `${sStr}.mp3`;
    const audio = new Audio(currentUrl);
    const timeout = setTimeout(() => { audio.pause(); tryPlayingSurah(idx + 1, servers, sStr, surah, btn); }, 6000);

    audio.play().then(() => {
        clearTimeout(timeout);
        currentAudio = audio;
        document.querySelectorAll(`[id^="play-btn-${surah}-"]`).forEach(b => b.innerHTML = '⏸️');
        setupEvents(audio, surah, 1, true);
    }).catch(() => {
        clearTimeout(timeout);
        tryPlayingSurah(idx + 1, servers, sStr, surah, btn);
    });
}

// --- وظيفة تشغيل آية محددة (للقراء القدامى بدقة) ---
function playSingleAyah(url, mirror, surah, ayah, btn) {
    currentAudio = new Audio(url);
    currentAudio.play().then(() => {
        if (btn) btn.innerHTML = '⏸️';
        setupEvents(currentAudio, surah, ayah, false);
    }).catch(() => {
        currentAudio = new Audio(mirror);
        currentAudio.play().then(() => {
            if (btn) btn.innerHTML = '⏸️';
            setupEvents(currentAudio, surah, ayah, false);
        }).catch(() => finalError(btn, "❌ الآية غير متاحة"));
    });
}

// --- إعداد الأحداث ---
function setupEvents(audio, sNum, aNum, isFull) {
    audio.onended = () => {
        document.querySelectorAll(`[id^="play-btn-"]`).forEach(b => b.innerHTML = '▶️');
        if (window.isContinuousPlay) {
            if (isFull) playAyah(sNum + 1, 1); // لو سورة، انقل للسورة اللي بعدها
            else playNextAyahAuto(sNum, aNum); // لو آية، انقل للآية اللي بعدها
        }
    };
}

function finalError(btn, msg) {
    if (btn) { btn.innerHTML = '⚠️'; setTimeout(() => btn.innerHTML = '▶️', 2000); }
    if (typeof Android !== 'undefined') Android.showToast(msg);
}
// دالة لتحديث أيقونات الصفحة عشان تورينا إن السورة شغالة
function updateAudioIcons(surah) {
    // بما إن السورة كاملة شغالة، ممكن نخلي كل زراير السورة دي "⏸️"
    document.querySelectorAll(`[id^="play-btn-${surah}-"]`).forEach(b => {
        b.innerHTML = '⏸️';
    });
}
// 🔄 دالة التحميل المسبق (Buffering) - بتشتغل في صمت
async function preloadNextAyah(surah, ayah) {
    let nS = surah, nA = ayah + 1;
    const currentSurahData = mushafSurahList.find(s => s.number === surah);
    
    if (nA > (currentSurahData?.numberOfAyahs || 0)) {
        nS++; nA = 1;
        if (nS > 114) return;
    }

    const s = String(nS).padStart(3, '0');
    const a = String(nA).padStart(3, '0');
    
    // بنجهز الرابط في كائن صوت منفصل ونحمله في الذاكرة
    nextAudio = new Audio(`https://everyayah.com/data/${currentReciter}/${s}${a}.mp3`);
    nextAudio.preload = "auto";
    nextAudio.load();
    console.log(`Buffered next: ${nS}:${nA}`);
}
// ✅ دالة الانتقال التلقائي للآية التالية بناءً على النطاق (سورة/جزء)
async function playNextAyahAuto(surah, ayah) {
    let nextSurah = surah;
    let nextAyah = ayah + 1;

    // الحصول على بيانات السورة الحالية لمعرفة عدد آياتها
    const currentSurahData = mushafSurahList.find(s => s.number === surah);
    const maxAyahs = currentSurahData ? currentSurahData.numberOfAyahs : 0;

    if (nextAyah > maxAyahs) {
        // السورة خلصت! نشوف هنوقف ولا هنكمل
        if (window.stopAtEnd === 'surah') {
            window.isContinuousPlay = false;
            if (typeof Android !== 'undefined') Android.showToast("تم ختم السورة ✅");
            return;
        }
        
        // لو هنكمل للجزء أو المصحف
        nextSurah++;
        nextAyah = 1;
        
        if (nextSurah > 114) {
            window.isContinuousPlay = false;
            return;
        }
    }

    // التحقق من الصفحة: لو الآية الجاية في صفحة جديدة، لازم نقلب الصفحة الأول
    try {
        const res = await fetch(`https://api.alquran.cloud/v1/ayah/${nextSurah}:${nextAyah}`);
        const json = await res.json();
        
        if (json.code === 200) {
            const nextPage = json.data.page;
            
            if (nextPage !== currentMushafPage) {
                // اقلب الصفحة
                currentMushafPage = nextPage;
                renderMushaf();
                // استنى ثانية لحد ما الصفحة تحمل وبعدين شغل الصوت
                setTimeout(() => playAyah(nextSurah, nextAyah), 1200);
            } else {
                playAyah(nextSurah, nextAyah);
            }
        }
    } catch (e) {
        window.isContinuousPlay = false;
    }
}
function stopAudio() {
    if(currentAudio){currentAudio.pause();currentAudio.src='';currentAudio=null;}
}

// ✅ بوكمارك الصفحة

async function togglePageBookmark() {
    // 1. البحث عن البوكمارك في القائمة الحالية بناءً على الصفحة والمود
    const exists = quranBookmarks.find(
        b => parseInt(b.page) === parseInt(currentMushafPage) && 
             b.mode === mushafMode && 
             !b.ayah_number
    );

    try {
        if (exists) {
            // 2. إذا كانت موجودة -> احذفها
            const { error } = await _supabase
                .from('quran_bookmarks')
                .delete()
                .eq('id', exists.id);
            
            if (error) throw error;
            showCustomToast('تم إزالة الصفحة من المحفوظات 🗑️');
        } else {
            // 3. إذا لم تكن موجودة -> أضفها مع تحديد المود الحالي
            const { error } = await _supabase
                .from('quran_bookmarks')
                .insert({
                    owner_name: currentUser,
                    page: currentMushafPage,
                    mode: mushafMode, // حفظ المود (reading أو tahajjud)
                    note: '',
                    created_at: new Date().toISOString()
                });
            
            if (error) throw error;
            showCustomToast('تم حفظ الصفحة بنجاح 🔖');
        }

        // 4. تحديث البيانات محلياً وإعادة رندر المصحف لتحديث لون الأيقونة
        await fetchQuranBookmarks();
        renderMushaf();
        
        // تحديث المعاينة في الصفحة الرئيسية لو مفتوحة
        if (typeof renderBookmarksPreview === 'function') {
            renderBookmarksPreview();
        }

    } catch (err) {
        console.error('Bookmark toggle failed:', err);
        showCustomToast('⚠️ عذراً، فشل تحديث العلامة');
    }
}

}

async function copyToClipboard(text) {
    if (!text) return;

    console.log("Attempting to copy:", text.substring(0, 20) + "...");

    // 1. الخيار الأول (الأفضل للـ HTTPS والمتصفحات الحديثة)
    if (navigator.clipboard && window.isSecureContext) {
        try {
            await navigator.clipboard.writeText(text);
            finishCopyAction();
            return;
        } catch (err) {
            console.log("Clipboard API failed, trying fallback...");
        }
    }

    // 2. الخطة البديلة (للويب العادي HTTP والـ WebView المستعصي)
    // السحر هنا إننا هنخلي العنصر "مرئي" لحظياً عشان المتصفح ميرفضش النسخ
    const textArea = document.createElement("textarea");
    textArea.value = text;
    
    // إعدادات تجعل العنصر موجود لكن غير مرئي للمستخدم
    textArea.style.cssText = "position:fixed; left:0; top:0; width:1px; height:1px; padding:0; border:none; outline:none; box-shadow:none; background:transparent; z-index:-1;";
    
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    
    // دعم إضافي للموبايل
    textArea.setSelectionRange(0, 99999);

    try {
        const successful = document.execCommand('copy');
        if (successful) {
            finishCopyAction();
        } else {
            alert("فشل النسخ، يرجى النسخ يدوياً");
        }
    } catch (err) {
        console.error('Fallback copy failed:', err);
    }

    document.body.removeChild(textArea);
}

function finishCopyAction() {
    showCustomToast('تم نسخ الآية ✅');
    // تنبيه الأندرويد لو شغال من التطبيق
    if (typeof Android !== 'undefined' && Android.showToast) {
        Android.showToast('تم النسخ ✅');
    }
}

function showCustomToast(msg) {
    let toast = document.getElementById('custom-copy-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'custom-copy-toast';
        toast.className = 'copy-toast';
        document.body.appendChild(toast);
    }
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2000);
}
async function saveMushafSettings() {
    if (!currentUser) return;
    
    const settings = {
        owner_name: currentUser,
        last_page_reading: parseInt(localStorage.getItem('mushaf_last_page_reading')) || 1,
        last_page_tahajjud: parseInt(localStorage.getItem('mushaf_last_page_tahajjud')) || 1,
        last_reciter: currentReciter
    };

    // استخدام upsert عشان لو الاسم موجود يعدل، لو مش موجود يضيف
    await _supabase.from('user_mushaf_settings').upsert(settings);
}
async function refreshHomeSettings() {
    const { data } = await _supabase
        .from('user_mushaf_settings')
        .select('*')
        .eq('owner_name', currentUser)
        .maybeSingle();

    if (data) {
        localStorage.setItem('mushaf_last_page_reading', data.last_page_reading);
        localStorage.setItem('mushaf_last_page_tahajjud', data.last_page_tahajjud);
        currentReciter = data.last_reciter; // حفظ الشيخ عالمياً
        renderMushafSelector(); // إعادة رسم المربعات بالأرقام الجديدة
    }
}
async function syncMushafSettings() {
    if (!currentUser) return;

    const lastPageReading = (mushafMode === 'reading') ? currentMushafPage : (parseInt(localStorage.getItem('mushaf_last_page_reading')) || 1);
    const lastPageTahajjud = (mushafMode === 'tahajjud') ? currentMushafPage : (parseInt(localStorage.getItem('mushaf_last_page_tahajjud')) || 1);

    // تحديث الـ LocalStorage فوراً عشان الواجهة الرئيسية بتعتمد عليه
    localStorage.setItem('mushaf_last_page_reading', lastPageReading);
    localStorage.setItem('mushaf_last_page_tahajjud', lastPageTahajjud);

    // تحديث الأرقام في المربعات الملونة فوراً في الخلفية
    const readingLabel = document.querySelector('#card-reading span:last-child');
    const tahajjudLabel = document.querySelector('#card-tahajjud span:last-child');
    if (readingLabel) readingLabel.innerText = `آخر صفحة: ${lastPageReading}`;
    if (tahajjudLabel) tahajjudLabel.innerText = `آخر صفحة: ${lastPageTahajjud}`;

    // الحفظ في سوبابيز
    await _supabase.from('user_mushaf_settings').upsert({
        owner_name: currentUser,
        last_page_reading: lastPageReading,
        last_page_tahajjud: lastPageTahajjud,
        last_reciter: currentReciter,
        updated_at: new Date().toISOString()
    });
}
async function playNextAyah(surah, ayah) {
    let nextSurah = surah;
    let nextAyah = ayah + 1;

    // جلب معلومات السورة الحالية عشان نعرف عدد آياتها
    const currentSurahInfo = mushafSurahList.find(s => s.number === surah);
    
    if (nextAyah > currentSurahInfo.numberOfAyahs) {
        // السورة خلصت!
        if (stopAtEnd === 'surah') {
            isContinuousPlay = false;
            if (typeof Android !== 'undefined') Android.showToast("تمت السورة ✅");
            return;
        }
        
        // لو مكملين (للجزء مثلاً)
        nextSurah++;
        nextAyah = 1;
        
        // لو خلصنا المصحف كله
        if (nextSurah > 114) { isContinuousPlay = false; return; }
        
        // التحقق من "الجزء" لو المود هو جزء
        if (stopAtEnd === 'juz') {
            const oldJuz = getJuzFromPage(currentMushafPage);
            // هنحتاج نتأكد من الصفحة الجديدة للآية الجاية
            // ده لوجيك متقدم شوية، بس كبداية خلينا في السورة
        }
    }

    // الانتقال للصفحة الجديدة لو الآية في صفحة تانية
    try {
        const res = await fetch(`https://api.alquran.cloud/v1/ayah/${nextSurah}:${nextAyah}`);
        const json = await res.json();
        if (json.code === 200) {
            if (json.data.page !== currentMushafPage) {
                currentMushafPage = json.data.page;
                renderMushaf(); // نحدث الصفحة
                // ننتظر الرندر يخلص وبعدين نشغل
                setTimeout(() => playAyah(nextSurah, nextAyah), 1000);
            } else {
                playAyah(nextSurah, nextAyah);
            }
        }
    } catch (e) { isContinuousPlay = false; }
}// ✅ القسم النهائي لتسجيل الدوال (استبدل الجزء الأخير في كودك بهذا)

window.navTo = (p) => {
    let pageNum = parseInt(p);
    
    // فحص المود المفتوح حالياً
    const isTahajjud = (typeof mushafMode !== 'undefined' && mushafMode === 'tahajjud');
    const max = isTahajjud ? 152 : 604;
    
    // التأمين
    if (isNaN(pageNum)) pageNum = 1;
    if (pageNum > max) pageNum = max;
    if (pageNum < 1) pageNum = 1;

    currentMushafPage = pageNum;

    // إغلاق لوحة الانتقال لو مفتوحة
    const navPanel = document.getElementById('mushaf-nav-panel');
    if (navPanel) navPanel.remove();

    // حفظ الصفحة في الكاش الصحيح
    const storageKey = isTahajjud ? 'mushaf_last_page_tahajjud' : 'mushaf_last_page_reading';
    localStorage.setItem(storageKey, currentMushafPage);
    
    // تحديث العرض
    if (document.getElementById('mushaf-overlay')) {
        renderMushaf();
    } else {
        openMushaf(mushafMode || 'reading');
    }
};
